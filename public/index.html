<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.5.1/jquery.min.js"></script>
    <script defer src="javascripts/index.js"></script>
    <link rel= "stylesheet" href= "stylesheets/index.css"/>
    <link href="/favicon.ico" type="image/x-icon" rel="icon" />
    <title>Matthew's Diecast Collection</title>
  </head>

  <header>
    <center>
      <h1 id="header">Matthew's Diecast Collection</h1>
    </center>
  </header>

  <body>
    <div id="searchBars" class="searchRow">
      <div class="column">
        <p>Search By:</p>
      </div>
      <div class="column">
        <select name="drivers" class="pagination" id="selectDriver">
          <option value="" selected>All Drivers</option>
        </select>
      </div>
      <div class="column">
        <select name="numbers" class="pagination" id="selectNumber">
          <option value="">All Numbers</option>
        </select>
      </div>
      <div class="column">
        <select name="series" class="pagination" id="selectSeries">
          <option value="">All Series</option>
        </select>
      </div>
      <div class="column">
        <select name="sponsors" class="pagination" id="selectSponsor">
          <option value="">All Sponsors</option>
        </select>
      </div>
      <div class="column">
        <select name="teams" class="pagination" id="selectTeam">
          <option value="">All Teams</option>
        </select>
      </div>
      <div class="column">
        <select name="manufacturers" class="pagination" id="selectManufacturer">
          <option value="">All Manufacturers</option>
        </select>
      </div>
      <div class="column">
        <select name="years" class="pagination" id="selectYear">
          <option value="">All Years</option>
        </select>
      </div>
      <div class="column">
        <button id="clearButton">Clear All</button>
        <button id="submitButton">Submit</button>
      </div>
    </div>

    <p id="resultsCounter"></p>

    <label for="pages" class="paginationLabel">Page:</label>
    <select name="pages" class="pagination" id="pageSelect">
      <option value="0" selected>1</option>
    </select>
  </body>
</html>
